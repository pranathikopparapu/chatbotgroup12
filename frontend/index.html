<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chatbot</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js"></script>
</head>

<body>

<div class="container">

  <div class="header">
    🤖 Food Assistant
  </div>

  <div id="chat-box"></div>

  <div class="input-area">
    <input id="question" placeholder="Ask something..." />

    <div class="input-buttons">
      <button id="voice-btn">🎤</button>
      <button id="send">➤</button>
    </div>
  </div>

</div>
<div class="suggestions">
  <button onclick="sendMessage('recommend items')">⭐ Recommend</button>
  <button onclick="sendMessage('cheap items')">💰 Cheap</button>
  <button onclick="sendMessage('highest rated')">🔥 Top Rated</button>
</div>

<script src="/static/script.js"></script>

</body>
</html>
